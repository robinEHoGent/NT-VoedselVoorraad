services:
  blob:
    container_name: blob
    image: mcr.microsoft.com/azure-storage/azurite:latest
    ports:
      - 10000:10000
      
  backend:
    build:
      context: ./Nimble-It.Backend
      dockerfile: Dockerfile
    container_name: ${BACKEND_CONTAINER_NAME}
    restart: unless-stopped
    depends_on:
      - blob
    environment:
      - ASPNETCORE_URLS=http://+:${INTERNAL_BACKEND_PORT:-8080}
 
      - MYSQL_CONNECTION_STRING=${MYSQL_CONNECTION}
      - AZURITE_BLOB_CONNECTIONSTRING=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://blob:10000/devstoreaccount1;
 
      - MYSQL_CONNECTION=Server=127.0.0.1;Port=3306;Database=nimbleit_db;User=root;Password=root;
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET}
      
      # Logging
      - Logging__LogLevel__Default=${LOGLEVEL:-information}
      - Logging__LogLevel__Microsoft.AspNetCore=${LOGLEVEL:-information}
      - Logging__LogLevel__Microsoft.EntityFrameworkCore.Database.Command=${SQLLOGLEVEL:-information}
      - TRACE_SQL_WITH_DATA=${TRACE_SQL_WITH_DATA:-false}
      
      # CORS
      - Cors__AllowedOrigins=http://localhost:${EXTERNAL_FRONTEND_PORT}
      - Cors__AllowedMethods=GET,POST,PUT,DELETE,PATCH,OPTIONS
      
    ports:
      - "${EXTERNAL_BACKEND_PORT:-5187}:${INTERNAL_BACKEND_PORT:-8080}"
    
  frontend:
    build: 
      context: ./Nimble-It.Frontend/Nimble-It
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
        - MINIFY=${MINIFY:-true}
    container_name: ${FRONTEND_CONTAINER_NAME}
    depends_on:
      - backend
    environment:
      # backend port and hosts
      - EXTERNAL_BACKEND_HOST=${APPLICATIONNAME}-backend
      - EXTERNAL_BACKEND_PORT=${INTERNAL_BACKEND_PORT}
      - INTERNAL_FRONTEND_PORT=${INTERNAL_FRONTEND_PORT}
    ports:
      - "${EXTERNAL_FRONTEND_PORT:-8080}:${INTERNAL_FRONTEND_PORT:-8080}"